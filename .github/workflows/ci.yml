name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new commit lands —
# saves runner minutes on rapid push sequences.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust stable (macOS)
    runs-on: macos-latest

    # Single-toolchain CI on purpose. We tried matrixing stable + 1.77 (the
    # original rust-version floor) but Tauri 2.x's transitive deps now require
    # edition2024 (Rust 1.85+), so 1.77 can't compile the project at all.
    # Maintaining an MSRV older than what the deps require is busywork for
    # zero benefit — users install via rustup (always recent stable) or via
    # the notarized .app (no Rust on the user's machine).

    defaults:
      run:
        working-directory: src-tauri

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets
